<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1D9E75">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="VB Tracker">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>VB Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    :root {
      --bg-body:#fff; --bg-surf:#f4f4f4; --bg-card:#fff; --bg-chip:#f0f0f0; --bg-inp:#fff;
      --text:#000; --text-sub:#555; --text-mut:#888; --bdr:#ccc; --bdr-card:#ddd; --net:#ccc;
    }
    html[data-dark] {
      --bg-body:#1a1a1a; --bg-surf:#252525; --bg-card:#252525; --bg-chip:#2a2a2a; --bg-inp:#2a2a2a;
      --text:#f0f0f0; --text-sub:#bbb; --text-mut:#999; --bdr:#444; --bdr-card:#444; --net:#555;
    }
    body  { font-family:system-ui,-apple-system,sans-serif; background:var(--bg-body); color:var(--text); }
    input { display:block; width:100%; padding:8px 10px; font-size:14px; font-family:inherit;
            border:1px solid var(--bdr); border-radius:7px; background:var(--bg-inp); color:var(--text); outline:none; }
    input:focus { border-color:#1D9E75; box-shadow:0 0 0 3px rgba(29,158,117,.15); }
    button { font-family:inherit; font-size:13px; border-radius:8px; border:1px solid var(--bdr);
             background:transparent; color:var(--text); cursor:pointer; transition:opacity .1s; }
    button:active { opacity:.7; }

    #setup { height:100%; overflow-y:auto; padding:14px; max-width:480px; margin:0 auto; }
    #setup.rotated {
      position:fixed; top:50%; left:50%; right:unset; bottom:unset;
      width:100dvh; height:100dvw; padding:14px;
      transform:translate(-50%,-50%) rotate(90deg);
      overflow-y:auto;
    }
    #game {
      position:fixed; top:0; left:0; right:0; bottom:0;
      display:flex; flex-direction:column; gap:5px; overflow:hidden;
      padding:max(env(safe-area-inset-top),6px) max(env(safe-area-inset-right),8px)
              max(env(safe-area-inset-bottom),6px) max(env(safe-area-inset-left),8px);
    }
    #game.rotated {
      top:50%; left:50%; right:unset; bottom:unset;
      width:100dvh; height:100dvw; padding:6px 8px;
      transform:translate(-50%,-50%) rotate(90deg);
    }

    .chip { cursor:pointer; }
    .srv { background:#FAEEDA!important; border:1.5px solid #BA7517!important; }
    .srv .lbl { color:#854F0B; } .srv .nm { color:#633806; font-weight:600; }
    .set { background:#EEEDFE!important; border:1.5px solid #7F77DD!important; }
    .set .lbl { color:#534AB7; } .set .nm { color:#3C3489; font-weight:500; }
    .srv-badge,.set-badge { border-radius:4px; font-size:10px; padding:1px 5px; white-space:nowrap; display:inline-block; flex-shrink:0; }
    .srv-badge { background:#FAEEDA; color:#854F0B; border:1px solid #BA7517; }
    .set-badge { background:#EEEDFE; color:#534AB7; border:1px solid #7F77DD; }
    html[data-dark] .srv { background:#412402!important; }
    html[data-dark] .srv .lbl { color:#EF9F27; } html[data-dark] .srv .nm { color:#FAC775; }
    html[data-dark] .set { background:#26215C!important; border-color:#AFA9EC!important; }
    html[data-dark] .set .lbl { color:#AFA9EC; } html[data-dark] .set .nm { color:#CECBF6; }
    html[data-dark] .srv-badge { background:#412402; color:#FAC775; border-color:#EF9F27; }
    html[data-dark] .set-badge { background:#26215C; color:#CECBF6; border-color:#AFA9EC; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

let wakeLock = null;
async function acquireWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && window.__vbGameActive) acquireWakeLock();
});

// Canvas-based font size calculator — finds largest font where longest name fits chipWidth
function calcFontSize(names, chipWidth) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const longest = names.reduce((a, b) => a.length >= b.length ? a : b, '');
  for (let s = 26; s >= 8; s--) {
    ctx.font = `500 ${s}px system-ui,-apple-system,sans-serif`;
    if (ctx.measureText(longest).width <= chipWidth - 10) return s;
  }
  return 8;
}

const { useState, useRef, useEffect, createElement: h } = React;

const ROMAN = ['I','II','III','IV','V','VI'];
const GA = [[4,3],[5,2],[0,1]];
const GB = [[1,0],[2,5],[3,4]];
const TA  = ['#1D9E75','#993C1D'];
const TAS = ['#1D9E75','#D85A30'];
const isSetter    = n  => n.toLowerCase().includes('(s)');
const pidx        = (g,t,pi) => (pi + g.rotation[t]) % 6;
const setterRoman = (g,t) => {
  const i = g.players[t].findIndex(isSetter);
  return i < 0 ? null : ROMAN[(i - g.rotation[t] + 6) % 6];
};

function Chip({ name, roman, server, setter, accent, onTap, fontSize }) {
  const cls = ['chip', server?'srv':setter?'set':''].filter(Boolean).join(' ');
  const plain = !server && !setter;
  return h('div', {
    className: cls, onClick: onTap,
    style: {
      flex:1, minWidth:0, height:'100%',
      background: plain ? 'var(--bg-chip)' : undefined,
      border:     plain ? `1.5px solid ${accent}` : undefined,
      borderRadius:8, padding:'3px 2px', textAlign:'center',
      display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center', overflow:'hidden',
    }
  },
    h('div', { className:'lbl', style:{ fontSize:10, color:'var(--text-mut)', marginBottom:2, lineHeight:1 } },
      roman + (server?' ★':setter?' S':'')),
    h('div', { className:'nm', style:{
      fontSize: fontSize || 16, fontWeight:(server||setter)?600:400, lineHeight:1.2,
      color:'var(--text)', whiteSpace:'nowrap', width:'100%', textAlign:'center', padding:'0 3px',
    }}, name)
  );
}

function Court({ g, names, onRotate, onTapChip }) {
  const sr = [setterRoman(g,0), setterRoman(g,1)];
  const courtRef = useRef(null);
  const [fontSize, setFontSize] = useState(16);

  useEffect(() => {
    if (!courtRef.current) return;
    const recalc = () => {
      if (!courtRef.current) return;
      const w = courtRef.current.offsetWidth - 12; // 6px padding each side
      const chipW = (w - 22 - 9) / 4;             // 22px net, 3×3px gaps
      const allNames = [...g.players[0], ...g.players[1]];
      setFontSize(calcFontSize(allNames, chipW));
    };
    recalc();
    const ro = new ResizeObserver(recalc);
    ro.observe(courtRef.current);
    return () => ro.disconnect();
  }, [g.players]);

  return h('div', { ref: courtRef,
    style: {
      flex:1, minHeight:0, background:'var(--bg-card)', border:'1px solid var(--bdr-card)',
      borderRadius:10, padding:'5px 6px', display:'flex', flexDirection:'column', gap:3,
    }
  },
    // Header row
    h('div', { style:{ display:'flex', alignItems:'center', gap:4, flexShrink:0 } },
      h('div', { style:{ flex:1, display:'flex', alignItems:'center', gap:3, minWidth:0, overflow:'hidden' } },
        h('div', { style:{ width:7, height:7, borderRadius:'50%', background:TA[0], flexShrink:0 } }),
        h('span', { style:{ fontSize:12, fontWeight:500, color:'var(--text)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' } }, names[0]),
        g.serving===0 && h('span', { className:'srv-badge' }, 'serving'),
        sr[0] && h('span', { className:'set-badge' }, 'S:'+sr[0]),
        h('button', { style:{ padding:'3px 8px', fontSize:11, borderRadius:6, flexShrink:0 }, onClick:()=>onRotate(0) }, '↻')
      ),
      h('div', { style:{ width:22, flexShrink:0 } }),
      h('div', { style:{ flex:1, display:'flex', alignItems:'center', gap:3, justifyContent:'flex-end', minWidth:0, overflow:'hidden' } },
        h('button', { style:{ padding:'3px 8px', fontSize:11, borderRadius:6, flexShrink:0 }, onClick:()=>onRotate(1) }, '↻'),
        sr[1] && h('span', { className:'set-badge' }, 'S:'+sr[1]),
        g.serving===1 && h('span', { className:'srv-badge' }, 'serving'),
        h('span', { style:{ fontSize:12, fontWeight:500, color:'var(--text)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' } }, names[1]),
        h('div', { style:{ width:7, height:7, borderRadius:'50%', background:TA[1], flexShrink:0 } })
      )
    ),
    // Court rows
    ...[0,1,2].map(row =>
      h('div', { key:row, style:{ flex:1, minHeight:0, display:'flex', gap:3 } },
        ...[0,1].map(col => {
          const pi=GA[row][col], idx=pidx(g,0,pi), pl=g.players[0][idx];
          const server = pi===0 && g.serving===0;
          return h(Chip, { key:col, name:pl, roman:ROMAN[idx], server, setter:isSetter(pl)&&!server, accent:TA[0], fontSize, onTap:()=>onTapChip(0,idx) });
        }),
        h('div', { style:{ width:22, flexShrink:0, display:'flex', alignItems:'stretch', justifyContent:'center', padding:'2px 0' } },
          h('div', { style:{ width:3, background:'var(--net)', borderRadius:2 } })
        ),
        ...[0,1].map(col => {
          const pi=GB[row][col], idx=pidx(g,1,pi), pl=g.players[1][idx];
          const server = pi===0 && g.serving===1;
          return h(Chip, { key:col, name:pl, roman:ROMAN[idx], server, setter:isSetter(pl)&&!server, accent:TA[1], fontSize, onTap:()=>onTapChip(1,idx) });
        })
      )
    )
  );
}

function EditPanel({ edit, onChange, teamName, onSave, onCancel }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current) ref.current.focus(); }, []);
  return h('div', { style:{ flexShrink:0, background:'var(--bg-card)', border:'1.5px solid var(--bdr)', borderRadius:10, padding:'8px 10px' } },
    h('div', { style:{ fontSize:11, color:'var(--text-mut)', marginBottom:6 } }, `Sub in — ${teamName}, player ${ROMAN[edit.idx]}`),
    h('div', { style:{ display:'flex', gap:8 } },
      h('input', { ref, value:edit.value, onChange:e=>onChange(e.target.value),
        onKeyDown:e=>{ if(e.key==='Enter') onSave(); if(e.key==='Escape') onCancel(); },
        style:{ flex:1, fontSize:15 }, placeholder:'New player name' }),
      h('button', { onClick:onSave,   style:{ padding:'0 16px', background:'#1D9E75', color:'#fff', border:'none', fontWeight:500 } }, 'Save'),
      h('button', { onClick:onCancel, style:{ padding:'0 12px' } }, '✕')
    )
  );
}

function App() {
  const [phase,    setPhase]    = useState('setup');
  const [names,    setNames]    = useState(['Team A','Team B']);
  const [inputs,   setInputs]   = useState([Array(6).fill(''), Array(6).fill('')]);
  const [firstSrv, setFirstSrv] = useState(0);
  const [hist,     setHist]     = useState([]);
  const [g,        setG]        = useState(null);
  const [edit,     setEdit]     = useState(null);
  const [rotated,  setRotated]  = useState(false);
  const [dark,     setDark]     = useState(() => {
    const saved = localStorage.getItem('vb-dark');
    if (saved !== null) return saved === '1';
    return window.matchMedia('(prefers-color-scheme:dark)').matches;
  });

  useEffect(() => {
    document.documentElement.toggleAttribute('data-dark', dark);
    localStorage.setItem('vb-dark', dark ? '1' : '0');
  }, [dark]);

  useEffect(() => {
    window.__vbGameActive = (phase === 'game');
    if (phase === 'game') acquireWakeLock();
    else releaseWakeLock();
  }, [phase]);

  // Auto-detect orientation in game mode only
  useEffect(() => {
    if (phase !== 'game') return;
    const update = () => setRotated(window.innerHeight > window.innerWidth);
    update();
    window.addEventListener('resize', update);
    window.addEventListener('orientationchange', update);
    return () => { window.removeEventListener('resize', update); window.removeEventListener('orientationchange', update); };
  }, [phase]);

  function start() {
    const players = inputs.map(t => t.map((n,i) => n.trim() || 'Player '+(i+1)));
    setG({ players, rotation:[0,0], points:[0,0], serving:firstSrv });
    setHist([]); setEdit(null); setPhase('game');
  }
  function switchSides() { setNames(n=>[n[1],n[0]]); setInputs(i=>[i[1],i[0]]); setFirstSrv(s=>1-s); }
  function score(t) {
    setEdit(null); setHist(h=>[...h,g]);
    setG(prev => {
      const pts=[...prev.points]; pts[t]++;
      let rot=[...prev.rotation], srv=prev.serving;
      if (t!==prev.serving) { srv=t; rot=[...prev.rotation]; rot[t]=(prev.rotation[t]+1)%6; }
      return {...prev, points:pts, rotation:rot, serving:srv};
    });
  }
  function rotateTeam(t) {
    setEdit(null); setHist(h=>[...h,g]);
    setG(prev => { const rot=[...prev.rotation]; rot[t]=(rot[t]+1)%6; return {...prev,rotation:rot}; });
  }
  function tapChip(t, idx) {
    if (edit && edit.t===t && edit.idx===idx) { setEdit(null); return; }
    setEdit({ t, idx, value: g.players[t][idx] });
  }
  function saveEdit() {
    if (!edit) return;
    const val = edit.value.trim() || g.players[edit.t][edit.idx];
    setHist(h=>[...h,g]);
    setG(prev => { const players=prev.players.map(tm=>[...tm]); players[edit.t][edit.idx]=val; return {...prev,players}; });
    setEdit(null);
  }
  function undo() {
    if (!hist.length) return;
    setEdit(null); setG(hist[hist.length-1]); setHist(h=>h.slice(0,-1));
  }

  const toggleDark    = () => setDark(d => !d);
  const toggleRotated = () => setRotated(r => !r);

  // Shared small control button style
  const ctrlBtn = (active, activeColor) => ({
    flex:1, padding:'5px 0', fontSize:12, fontWeight:500,
    border:`1.5px solid ${active ? activeColor : 'var(--bdr)'}`,
    background: active ? activeColor : 'transparent',
    color: active ? '#fff' : 'var(--text-sub)',
    borderRadius:8, whiteSpace:'nowrap',
  });

  // ── Setup ──────────────────────────────────────────────────────────────────
  if (phase === 'setup') return h('div', { id:'setup', className: rotated ? 'rotated' : '' },
    h('div', { style:{ display:'flex', alignItems:'center', gap:8, marginBottom:14 } },
      h('h2', { style:{ fontSize:18, fontWeight:500, flex:1, color:'var(--text)' } }, 'VB Rotation Tracker'),
      h('button', { onClick:toggleRotated, style: ctrlBtn(rotated, '#1D9E75') }, rotated ? '↻ on' : '↻ off'),
      h('button', { onClick:toggleDark,    style: ctrlBtn(false, '') }, dark ? '☀' : '☾')
    ),
    h('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:10 } },
      ...[0,1].map(t => h('div', { key:t, style:{ border:`2px solid ${TA[t]}`, borderRadius:10, padding:'11px 12px' } },
        h('input', { value:names[t], onChange:e=>setNames(n=>n.map((v,i)=>i===t?e.target.value:v)),
          style:{ marginBottom:8, fontWeight:500, fontSize:14 }, placeholder:`Team ${t?'B':'A'} name` }),
        ...Array(6).fill(0).map((_,pi) => h('input', {
          key:pi, value:inputs[t][pi],
          onChange:e=>setInputs(p=>{ const nx=p.map(a=>[...a]); nx[t][pi]=e.target.value; return nx; }),
          placeholder:`${ROMAN[pi]} — player name`, style:{ marginBottom:pi<5?5:0, fontSize:12 }
        }))
      ))
    ),
    h('button', { onClick:switchSides, style:{ width:'100%', padding:'11px 0', borderRadius:10, fontSize:14, marginBottom:12 } },
      '⇄  Switch sides (' + names[1] + ' ← → ' + names[0] + ')'),
    h('div', { style:{ background:'var(--bg-surf)', borderRadius:8, padding:'7px 10px', marginBottom:12, fontSize:12, color:'var(--text-mut)' } },
      'Add ', h('code',null,'(S)'), ' to setter name — e.g. "Alex (S)"'),
    h('div', { style:{ marginBottom:14 } },
      h('div', { style:{ fontSize:13, color:'var(--text-mut)', marginBottom:7 } }, 'First serve'),
      h('div', { style:{ display:'flex', gap:8 } },
        ...[0,1].map(t => h('button', { key:t, onClick:()=>setFirstSrv(t), style:{
          flex:1, padding:'10px 0', fontSize:14,
          background: firstSrv===t ? (t===0?'#E1F5EE':'#FAECE7') : 'transparent',
          border: `1.5px solid ${firstSrv===t ? TA[t] : 'var(--bdr)'}`,
          color:   firstSrv===t ? (t===0?'#085041':'#4A1B0C') : 'var(--text)',
          fontWeight: firstSrv===t ? 500 : 400,
        } }, names[t]))
      )
    ),
    h('button', { onClick:start, style:{
      width:'100%', padding:'14px 0', background:'#1D9E75', color:'#fff',
      border:'none', borderRadius:10, fontSize:16, fontWeight:600,
    } }, 'Start')
  );

  // ── Game ───────────────────────────────────────────────────────────────────
  return h('div', { id:'game', className: rotated ? 'rotated' : '' },
    // Top bar: scores + control buttons
    h('div', { style:{ flexShrink:0, background:'var(--bg-surf)', borderRadius:8, padding:'5px 8px', display:'flex', flexDirection:'column', gap:5 } },
      // Scores row
      h('div', { style:{ display:'flex' } },
        h('div', { style:{ flex:1 } },
          h('div', { style:{ fontSize:11, color:'var(--text-mut)', lineHeight:1 } }, names[0]),
          h('div', { style:{ fontSize:30, fontWeight:500, color:TAS[0], lineHeight:1.1 } }, g.points[0])
        ),
        h('div', { style:{ flex:1, textAlign:'right' } },
          h('div', { style:{ fontSize:11, color:'var(--text-mut)', lineHeight:1 } }, names[1]),
          h('div', { style:{ fontSize:30, fontWeight:500, color:TAS[1], lineHeight:1.1 } }, g.points[1])
        )
      ),
      // Controls row
      h('div', { style:{ display:'flex', gap:5 } },
        h('button', { onClick:toggleRotated, style: ctrlBtn(rotated, '#1D9E75') }, rotated ? '↻ on' : '↻ off'),
        h('button', { onClick:toggleDark,    style: ctrlBtn(false, '') }, dark ? '☀ Light' : '☾ Dark'),
        h('button', {
          onClick:()=>{ if(window.confirm('Undo last action?')) undo(); },
          disabled:!hist.length,
          style:{ ...ctrlBtn(false,''), opacity: hist.length ? 1 : 0.4 }
        }, '↩ Undo'),
        h('button', {
          onClick:()=>{ if(window.confirm('End current game and start a new one?')){ setPhase('setup'); setG(null); setHist([]); setEdit(null); } },
          style: ctrlBtn(false,'')
        }, 'New game')
      )
    ),
    h(Court, { g, names, onRotate:rotateTeam, onTapChip:tapChip }),
    edit && h(EditPanel, { edit, onChange:val=>setEdit(e=>({...e,value:val})), teamName:names[edit.t], onSave:saveEdit, onCancel:()=>setEdit(null) }),
    // +1 buttons — full bottom, big and bold
    h('div', { style:{ flexShrink:0, display:'flex', gap:8 } },
      ...[0,1].map(t => h('button', { key:t, onClick:()=>score(t), style:{
        flex:1, padding:'16px 0', background:TAS[t], color:'#fff',
        border:'none', borderRadius:10, fontSize:20, fontWeight:700, letterSpacing:'.01em',
      } }, '+1 ' + names[t]))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
